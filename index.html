<style>
body {
    margin: 0;

}

.header {
    background: linear-gradient(135deg, #ff2f7a, #ff4f9a);
    padding: 60px 20px 40px;
    text-align: center;
    color: white;
}

.profile {

}

.tag {
    display: inline-block;

    border-radius: 25px;
    font-size: 14px;
    margin: 5px;
}

.yellow {
    background: #ffd84d;
    color: black;
}

.white {
    background: white;
    color: #333;
}

.premium {
    margin-top: 12px;
    font-size: 15px;
}

.card {
    background: linear-gradient(135deg, #ffffff, #ffeaf3);
    margin: 20px;
    padding: 18px;
    border-radius: 15px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.05);
    font-size: 13px;
}

.stats {
    display: flex;
    gap: 15px;
    margin: 20px;
}

.stat {
    flex: 1;
    background: #ffe6ef;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
}

.stat h2 {
    margin: 0;
    color: #ff2f7a;
}

.join-btn {
    display: block;
    margin: 10px 20px 25px;
    padding: 16px;
    text-align: center;
    background: linear-gradient(135deg, #ff2f7a, #ff4f9a);
    color: white;
    border-radius: 35px;
    font-size: 18px;
    text-decoration: none;
    box-shadow: 0 8px 20px rgba(255, 47, 122, 0.3);
    transition: 0.3s;
}

.join-btn:hover {
    transform: scale(1.05);
}

.features {
    display: flex;
    justify-content: space-around;
    margin: 20px;
    flex-wrap: wrap;
}

.feature {
    background: white;
    padding: 15px;
    border-radius: 15px;
    width: 45%;
    text-align: center;
    font-size: 12px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.05);
    margin-bottom: 10px;
}

.feature i {
    font-size: 20px;
