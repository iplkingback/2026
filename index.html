<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Telegram Community</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #f6f6f6;
}

/* HEADER */
.header {
    background: linear-gradient(135deg, #ff2f7a, #ff4f9a);
    padding: 60px 20px 40px;
    text-align: center;
    color: white;
}

.profile {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: url('vkp.webp') center/cover no-repeat;
    margin: auto;
    border: 6px solid rgba(255,255,255,0.4);
}

h1 {
    margin: 15px 0 10px;
    font-weight: 600;
    letter-spacing: 1px;
}

/* TAGS */
.tag {
    display: inline-block;
    padding: 8px 18px;
    border-radius: 25px;
    font-size: 14px;
    margin: 5px;
}

.yellow {
    background: #ffd84d;
    color: black;
}

.white {
    background: white;
    color: #333;
}

/* PREMIUM TEXT */
.premium {
    margin-top: 12px;
    font-size: 15px;
}

/* CARD */
.card {
    background: linear-gradient(135deg, #ffffff, #ffeaf3);
    margin: 20px;
    padding: 18px;
    border-radius: 15px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.05);
    font-size: 13px; /* Reduced by 2px from original 15px */
}

/* STATS */
.stats {
    display: flex;
    gap: 15px;
    margin: 20px;
}

.stat {
    flex: 1;
    background: #ffe6ef;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
}

.stat h2 {
    margin: 0;
    color: #ff2f7a;
}

/* BUTTON */
.join-btn {
    display: block;
    margin: 10px 20px 25px; /* reduced top margin to be closer to card */
    padding: 16px;
    text-align: center;
    background: linear-gradient(135deg, #ff2f7a, #ff4f9a);
    color: white;
    border-radius: 35px;
    font-size: 18px;
    text-decoration: none;
    box-shadow: 0 8px 20px rgba(255, 47, 122, 0.3);
}

/* FEATURES */
.features {
    display: flex;
    justify-content: space-around;
    margin: 20px;
}

.feature {
    background: white;
    padding: 15px;
    border-radius: 15px;
    width: 22%;
    text-align: center;
    font-size: 12px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.05);
}

.feature i {
    font-size: 20px;
    margin-bottom: 5px;
}
</style>



</head>

<body>

<div class="header">
    <div class="profile"></div>

    <h1>MATCH FIXER</h1>

    <div>
        <span class="tag yellow"><i class="fas fa-bolt"></i> Power Tips</span>
        <span class="tag white"><i class="fas fa-bullseye"></i> Expert</span>
    </div>

    <div class="premium">
        ⭐ Premium Community • • •
    </div>
</div>

<div class="card">
    <strong><i class="fas fa-tv"></i> Entertainment & Educational Purpose</strong>
    <p>Join for insights, analysis & community discussions</p>
</div>

<!-- Moved Join Telegram button just below the card -->
<a href="#" onclick="trackSubscribeAndRedirect()" class="join-btn">
    <i class="fas fa-mobile-alt"></i> Join Telegram Now
</a>

<div class="stats">
    <div class="stat">
        <h2>94K+</h2>
        <p>ACTIVE MEMBERS</p>
    </div>

    <div class="stat">
        <h2>4.2 ⭐</h2>
        <p>RATING</p>
    </div>
</div>

<div class="features">
    <div class="feature">
        <i class="fas fa-check"></i>
        <div>Verified</div>
    </div>

    <div class="feature">
        <i class="fas fa-lock"></i>
        <div>Secure</div>
    </div>

    <div class="feature">
        <i class="fas fa-chart-bar"></i>
        <div>Analytics</div>
    </div>

    <div class="feature">
        <i class="fas fa-trophy"></i>
        <div>Premium</div>
    </div>
</div>

</body>
</html>
